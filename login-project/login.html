<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:15px;

    background:#0d0d0d;
}

.container{

    width:100%;

    max-width:950px;

    display:flex;

    flex-wrap:wrap;

    overflow:hidden;

    border-radius:25px;

    background:#111;

    box-shadow:0 0 25px rgba(255,255,255,.08);
}

/* الصورة */

.left{

    flex:1 1 400px;
}

.left img{

    width:100%;

    height:100%;

    object-fit:cover;
}

/* اللوجين */

.right{

    flex:1 1 400px;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;
}

.login-box{

    width:100%;

    max-width:350px;
}

.login-box h2{

    text-align:center;

    color:white;

    font-size:40px;

    margin-bottom:30px;
}

input{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    background:#1e1e1e;

    color:white;

    font-size:16px;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:white;

    color:black;

    font-size:18px;

    cursor:pointer;

    margin-top:10px;
}

button:hover{

    opacity:.8;
}

/* موبايل */

@media(max-width:768px){

    .container{

        flex-direction:column;
    }

    .left img{

        height:250px;
    }

    .right{

        padding:25px;
    }

    .login-box h2{

        font-size:32px;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="left">

        <img src="me.jpg">

    </div>

    <div class="right">

        <div class="login-box">

            <h2>LOGIN 🔐</h2>

            <input type="text"
            id="username"
            placeholder="Username">

            <input type="password"
            id="password"
            placeholder="Password">

            <button onclick="check()">
                LOGIN
            </button>

        </div>

    </div>

</div>

<script>

function check(){

    let user =
    document.getElementById("username").value;

    let pass =
    document.getElementById("password").value;

    if(user === "saif2004" && pass === "2005910"){

        localStorage.setItem("login","true");

        window.location.href = "home.html";

    }else{

        alert("Wrong Password ❌");
    }
}

/* Enter */

document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        check();
    }

});

</script>

</body>
</html>
