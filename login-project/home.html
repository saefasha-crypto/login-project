<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saif Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#0d0d0d;

    color:white;

    overflow-x:hidden;
}

/* أول الصفحة */

.container{

    display:flex;

    align-items:center;

    justify-content:space-between;

    min-height:100vh;

    padding:60px;

    gap:50px;

    flex-wrap:wrap;

    background:
    linear-gradient(to right,#000,#111,#1a1a1a);
}

/* الكلام */

.left{

    flex:1;

    min-width:300px;
}

.left h1{

    font-size:75px;

    line-height:1.1;
}

.left h2{

    margin-top:15px;

    font-size:35px;

    color:#bfbfbf;
}

/* السهم */

.arrow{

    margin-top:40px;

    font-size:55px;

    animation:move 1.2s infinite;
}

@keyframes move{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(15px);
    }

    100%{
        transform:translateY(0);
    }
}

/* الصورة */

.right{

    flex:1;

    display:flex;

    justify-content:center;
}

.right img{

    width:100%;

    max-width:500px;

    border-radius:30px;

    object-fit:cover;

    box-shadow:
    0 0 30px rgba(255,255,255,.15);
}

/* الشهادات */

.certificates{

    padding:80px 20px;

    text-align:center;
}

.certificates h2{

    font-size:45px;

    margin-bottom:50px;
}

/* الكروت */

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.cards img{

    width:100%;

    border-radius:20px;

    cursor:pointer;

    transition:.3s;
}

.cards img:hover{

    transform:scale(1.05);
}

/* popup */

#popup{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.95);

    justify-content:center;

    align-items:center;

    z-index:999;
}

#popup img{

    width:90%;

    max-width:900px;

    border-radius:20px;
}

/* 📱 الموبايل */

@media(max-width:768px){

    .container{

        flex-direction:column;

        justify-content:center;

        text-align:center;

        padding:40px 20px;

        min-height:auto;
    }

    .left h1{

        font-size:42px;
    }

    .left h2{

        font-size:22px;
    }

    .right img{

        width:100%;

        max-width:300px;
    }

    .certificates h2{

        font-size:30px;
    }

}

</style>

</head>

<body>

<!-- أول الصفحة -->

<div class="container">

    <!-- الكلام -->

    <div class="left">

        <h1>

            ENG <br>

            SAIF MOHAMED

        </h1>

        <h2>
            Frontend Developer
        </h2>

        <div class="arrow">
            ↓
        </div>

    </div>

    <!-- الصورة -->

    <div class="right">

        <img src="me.jpg">

    </div>

</div>

<!-- الشهادات -->

<div class="certificates">

    <h2>
        My Certificates 🎓
    </h2>

    <div class="cards">

        <img src="c2.jpg" onclick="openImg(this)">
        <img src="c3.jpg" onclick="openImg(this)">
        <img src="c4.jpg" onclick="openImg(this)">
        <img src="c5.jpg" onclick="openImg(this)">
        <img src="c6.jpg" onclick="openImg(this)">
        <img src="c7.jpg" onclick="openImg(this)">
        <img src="c8.jpg" onclick="openImg(this)">
        <img src="c9.jpg" onclick="openImg(this)">
        <img src="c10.jpg" onclick="openImg(this)">

    </div>

</div>

<!-- popup -->

<div id="popup" onclick="closeImg()">

    <img id="popup-img">

</div>

<script>

function openImg(img){

    document.getElementById("popup").style.display = "flex";

    document.getElementById("popup-img").src = img.src;
}

function closeImg(){

    document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
