<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background:
    linear-gradient(135deg,#000,#111,#1a1a1a);
}

/* الكونتينر */

.container{

    width:100%;

    max-width:950px;

    display:flex;

    flex-wrap:wrap;

    overflow:hidden;

    border-radius:25px;

    background:#111;

    box-shadow:
    0 0 30px rgba(255,255,255,.08);
}

/* الصورة */

.left{

    flex:1;

    min-width:300px;
}

.left img{

    width:100%;

    height:100%;

    object-fit:cover;
}

/* ناحية اللوجين */

.right{

    flex:1;

    min-width:300px;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;
}

/* بوكس اللوجين */

.login-box{

    width:100%;
}

/* العنوان */

.login-box h2{

    text-align:center;

    font-size:45px;

    margin-bottom:30px;

    color:white;
}

/* الانبوت */

input{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    background:#1e1e1e;

    color:white;

    font-size:16px;

    outline:none;
}

/* الزر */

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:white;

    color:black;

    font-size:18px;

    cursor:pointer;

    margin-top:10px;

    transition:.3s;
}

button:hover{

    opacity:.8;
}

/* اهتزاز */

.shake{

    animation:shake .4s;
}

@keyframes shake{

    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}

/* 📱 الموبايل */

@media(max-width:768px){

    .container{

        flex-direction:column;
    }

    .left{

        width:100%;
    }

    .left img{

        height:300px;
    }

    .right{

        width:100%;

        padding:25px;
    }

    .login-box h2{

        font-size:35px;
    }

}

</style>

</head>

<body>

<div class="container">

    <!-- الصورة -->

    <div class="left">

        <img src="me.jpg">

    </div>

    <!-- اللوجين -->

    <div class="right">

        <div class="login-box">

            <h2>LOGIN 🔐</h2>

            <input type="text"
            id="username"
            placeholder="Username">

            <input type="password"
            id="password"
            placeholder="Password">

            <button onclick="check()">
                LOGIN
            </button>

        </div>

    </div>

</div>

<script>

let attempts = 0;

function check(){

    let user =
    document.getElementById("username").value;

    let pass =
    document.getElementById("password").value;

    let box =
    document.querySelector(".login-box");

    let btn =
    document.querySelector("button");

    if(user === "saif2004" && pass === "246805"){

        localStorage.setItem("login","true");

        window.location.href="home.html";

    }else{

        attempts++;

        box.classList.add("shake");

        setTimeout(() => {

            box.classList.remove("shake");

        },500);

        alert("Wrong Password ❌");

        if(attempts >= 3){

            btn.disabled = true;

            btn.innerHTML = "LOCKED 🔒";

            btn.style.background = "gray";

            setTimeout(() => {

                attempts = 0;

                btn.disabled = false;

                btn.innerHTML = "LOGIN";

                btn.style.background = "white";

            },30000);
        }
    }
}

/* Enter */

document.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        check();
    }

});

</script>

</body>
</html>
